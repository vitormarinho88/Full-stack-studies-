<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles2.css">
    <title>TimeOut / Interval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"rel="stylesheet">
</head>

<body>
    <h1>0</h1>
    <button class="button-start" onclick="start()"></button>
    <button class="button-stop"  onclick="stop()"></button>                                  
    <button class="button-reset" onclick="reset()"></button>
</body>
<script>
    /*
     setTimeout -> Executa uma vez
     setInterval -> Executa infinitas vezes
     ClearInterval -> Pausa o tempo do setInterval

    setTimeout(function () {
        alert("EXECUTEI")
    }, 5000);
  
    setInterval(() => {
        console.log(Number++)
    },1000);
    
    */

    let number = 0
    let cron
    let h1 = document.querySelector('h1')

    function start() {
        cron = setInterval(function () {
            number++
            h1.innerHTML = number
        }, 1000)
    }

    function stop() {
        clearInterval(cron)
    }

    function reset() {
        number = 0
        h1.innerHTML = number
    }




</script>

</html>
