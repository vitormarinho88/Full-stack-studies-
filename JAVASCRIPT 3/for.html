<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For - Challenge</title>
</head>

<body>
    <input placeholder="Digite o nome do contato">
    <p></p>
    <button onclick="search()">Procurar Contato</button>
</body>
<script>
    let p = document.querySelector('p')
    let input = document.querySelector('input')

    const contacts = [
        { name: 'Vitor', number: '(63) 99295-7998' },
        { name: 'Rogerin', number: '(63) 984424771' },
        { name: 'Lurdinha', number: '(63) 984313038' },
        { name: 'Lorrane', number: '(63) 8472-8506' },
    ]



    function search() {

        let i = 0
        while (i < contacts.length) {

            if (input.value.toLowerCase() === contacts[i].name.toLowerCase()) {
                p.innerHTML = `Contato encontrado Nome: ${contacts[i].name} - Número: ${contacts[i].number}`
                break
            } else {
                p.innerHTML = `Contato não encontrado`
            }

            i++;
        }
    }
